name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        env:
          NEXT_PUBLIC_SITE_URL: https://example.invalid
        run: npm run verify

      - name: Build production container
        run: docker build --build-arg NEXT_PUBLIC_SITE_URL=https://example.invalid --tag twilight-leap:${{ github.sha }} .
